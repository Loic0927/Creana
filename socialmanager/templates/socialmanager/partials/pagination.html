{% if is_paginated %}
    <nav aria-label="Pagination">
        <div class="pagination">
            {% if page_obj.has_previous %}
                <a class="btn btn-secondary" href="?page={{ page_obj.previous_page_number }}">Previous</a>
            {% else %}
                <span class="btn btn-secondary is-disabled">Previous</span>
            {% endif %}
            <span>Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
            {% if page_obj.has_next %}
                <a class="btn btn-secondary" href="?page={{ page_obj.next_page_number }}">Next</a>
            {% else %}
                <span class="btn btn-secondary is-disabled">Next</span>
            {% endif %}
        </div>
    </nav>
{% endif %}
